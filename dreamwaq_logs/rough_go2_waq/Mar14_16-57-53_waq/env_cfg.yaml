asset:
  angular_damping: 0.0
  armature: 0.0
  collapse_fixed_joints: true
  default_dof_drive_mode: 3
  density: 0.001
  disable_gravity: false
  file: '{LEGGED_GYM_ROOT_DIR}/resources/robots/go2/urdf/go2.urdf'
  fix_base_link: false
  flip_visual_attachments: true
  foot_name: foot
  linear_damping: 0.0
  max_angular_velocity: 1000.0
  max_linear_velocity: 1000.0
  name: go2
  penalize_contacts_on:
  - thigh
  - calf
  replace_cylinder_with_capsule: true
  self_collisions: 1
  terminate_after_contacts_on:
  - base
  thickness: 0.01
commands:
  curriculum: true
  heading_command: true
  inference_command: x
  inference_policy: false
  max_curriculum: 1.0
  num_commands: 4
  ranges:
    ang_vel_yaw:
    - -1
    - 1
    heading:
    - -3.14
    - 3.14
    lin_vel_x:
    - -1.0
    - 1.0
    lin_vel_y:
    - -1.0
    - 1.0
  resampling_time: 10.0
control:
  action_scale: 0.25
  control_type: P
  damping:
    joint: 0.5
  decimation: 4
  stiffness:
    joint: 20.0
domain_rand:
  added_mass_range:
  - -1.0
  - 2.0
  com_range:
  - -0.05
  - 0.05
  d_gains_range:
  - 0.9
  - 1.1
  friction_range:
  - 0.2
  - 1.25
  max_push_vel_xy: 1.0
  motor_strength_range:
  - 0.9
  - 1.1
  p_gains_range:
  - 0.9
  - 1.1
  push_interval: !!python/object/apply:numpy.core.multiarray.scalar
  - !!python/object/apply:numpy.dtype
    args:
    - f8
    - false
    - true
    state: !!python/tuple
    - 3
    - <
    - null
    - null
    - null
    - -1
    - -1
    - 0
  - !!binary |
    AAAAAACASUA=
  push_interval_s: 1.0
  push_robots: true
  randomize_base_mass: true
  randomize_com: true
  randomize_d_gains: true
  randomize_friction: true
  randomize_motor_strength: true
  randomize_p_gains: true
  system_delay: true
env:
  env_spacing: 3.0
  episode_length_s: 20
  len_obs_history: 5
  num_actions: 12
  num_context: 16
  num_envs: 4096
  num_estvel: 3
  num_observations: 45
  num_privileged_obs: 190
  send_timeouts: true
init_member_classes: {}
init_state:
  ang_vel:
  - 0.0
  - 0.0
  - 0.0
  default_joint_angles:
    FL_calf_joint: -1.5
    FL_hip_joint: 0.1
    FL_thigh_joint: 0.8
    FR_calf_joint: -1.5
    FR_hip_joint: -0.1
    FR_thigh_joint: 0.8
    RL_calf_joint: -1.5
    RL_hip_joint: 0.1
    RL_thigh_joint: 1.0
    RR_calf_joint: -1.5
    RR_hip_joint: -0.1
    RR_thigh_joint: 1.0
  lin_vel:
  - 0.0
  - 0.0
  - 0.0
  pos:
  - 0.0
  - 0.0
  - 0.34
  rot:
  - 0.0
  - 0.0
  - 0.0
  - 1.0
noise:
  add_noise: false
  noise_level: 1.0
  noise_scales:
    ang_vel: 0.2
    dof_pos: 0.01
    dof_vel: 1.5
    gravity: 0.05
    height_measurements: 0.1
    lin_vel: 0.1
normalization:
  clip_actions: 100.0
  clip_observations: 100.0
  fixed_norm: false
  obs_scales:
    ang_vel: 0.25
    dof_pos: 1.0
    dof_vel: 0.05
    height_measurements: 5.0
    lin_vel: 2.0
rewards:
