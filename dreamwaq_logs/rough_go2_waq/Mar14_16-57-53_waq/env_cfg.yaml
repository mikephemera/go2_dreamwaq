  desired_foot_height: 0.12
  max_contact_force: 100.0
  only_positive_rewards: false
  scales:
    action_rate: -0.01
    ang_vel_xy: -0.05
    base_height: -1.0
    collision: -0.0
    dof_acc: -2.5e-07
    dof_pos_limits: -0.0
    dof_vel: -0.0
    feet_air_time: 0.0
    feet_stumble: -0.0
    foot_clearance: -0.01
    joint_power: -2.0e-05
    lin_vel_z: -2.0
    orientation: -0.2
    power_distribution: -1.0e-06
    smoothness: -0.01
    stand_still: -0.0
    termination: -0.0
    torques: -0.0
    tracking_ang_vel: 0.5
    tracking_lin_vel: 1.0
  soft_dof_pos_limit: 0.9
  soft_dof_vel_limit: 1.0
  soft_torque_limit: 1.0
  tracking_sigma: 0.25
seed: 1
